# Deploys to Azure App Service on every push to main.
#
# This is the standard publish-profile flow. Because publish-profile auth
# does NOT accept a startup-command input here, set the startup command in
# the Azure portal instead (see README, "Azure setup" step). Also set the
# app setting SCM_DO_BUILD_DURING_DEPLOYMENT=true so Azure installs
# requirements.txt during deployment.
#
# Before this runs, add two things in GitHub repo settings:
#   - Secret AZURE_WEBAPP_PUBLISH_PROFILE  (download from the App Service)
#   - Update AZURE_WEBAPP_NAME below to your app's name
name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: telcan-rfid
  PYTHON_VERSION: "3.12"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Zip artifact for deployment
        run: zip -r release.zip . -x "venv/*" ".git/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
